name: Deploy backend to Fly.io

# Manual-only trigger.
#
# Background: this workflow used to auto-run on every push to main that
# touched backend/**. It has been failing on every recent push — likely
# because the FLY_API_TOKEN repository secret is missing, expired, or
# misconfigured. Rather than fix secrets from a code commit, we made the
# workflow manual-only so it no longer fails automatically.
#
# To use it: GitHub → repo → Actions → "Deploy backend to Fly.io" →
# "Run workflow" → main. Requires a valid FLY_API_TOKEN repository
# secret with deploy permission for the alkabeer-prod Fly app.
#
# If FLY_API_TOKEN is missing or expired, use the reliable fallback:
#   cd backend && flyctl deploy
# from a developer machine with `flyctl auth login` already done.
on:
  workflow_dispatch:

# Cancel any in-progress runs of the same workflow on the same branch.
concurrency:
  group: fly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: ./backend
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# ---------------------------------------------------------------------------
# Setup notes (one-time):
#
#   1. Generate a Fly deploy token:
#         flyctl tokens create deploy --app alkabeer-prod
#
#   2. In GitHub: repo → Settings → Secrets and variables → Actions → New
#      repository secret. Name: FLY_API_TOKEN. Value: the token above.
#
#   3. Push to main — this workflow runs and deploys.
#
# Frontend is NOT in this workflow. Vercel auto-deploys frontend on every
# push to main from its own GitHub integration; no Action needed.
# ---------------------------------------------------------------------------
