# Fly.io app config — alkabeer-prod
# Frankfurt region (fra) chosen for best latency to Egypt/MENA.
#
# After editing, deploy with:    flyctl deploy
# Tail logs with:                 flyctl logs
# Set secrets with:               flyctl secrets set KEY=value
#
# Free hobby allowance: up to 3 shared-cpu-1x machines @ 256MB.
# We use one machine and keep it warm so WebSocket games don't get cold-starts.

app           = "alkabeer-prod"
primary_region = "fra"

[build]

[env]
  NODE_ENV = "production"
  PORT     = "5000"

[http_service]
  internal_port       = 5000
  force_https         = true
  auto_stop_machines  = "off"   # keep VM warm so Socket.IO sessions survive
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "20s"
    method       = "get"
    path         = "/api/status"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"

# WebSocket survives the standard http_service handler — no special config needed.
# Fly's edge proxy speaks HTTP/1.1 + Upgrade automatically.
